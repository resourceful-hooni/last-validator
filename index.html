<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d10" />

    <title>마지막 검증자 — 초록불의 함정</title>
    <meta name="description" content="AI는 일자리를 빼앗지 않았다. 그것을 검증할 능력을 비웠다. 2036년의 한 실패를 거꾸로 추적하는 인터랙티브 경험." />

    <!-- 파비콘 (자작 SVG · public/ 루트 경로 = Vite가 그대로 복사) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#e24a3d" />

    <!-- Open Graph (og:image는 절대 URL이 이상적; 배포 도메인 확정 시 교체) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="마지막 검증자 — 초록불의 함정" />
    <meta property="og:description" content="모든 지표가 초록불이었다. 그래서 망했다. 2026년의 다섯 선택이 2036년을 만든다." />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="zh_CN" />
    <meta property="og:locale:alternate" content="ja_JP" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="마지막 검증자 — 초록불의 함정" />
    <meta name="twitter:description" content="모든 지표가 초록불이었다. 그래서 망했다." />
    <meta name="twitter:image" content="/og.png" />

    <!-- hreflang/canonical은 배포 origin을 알아야 정확하므로 런타임(i18n 부팅)에서 주입한다. -->

  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <p style="color:#e7eaed;background:#0b0d10;padding:24px;font-family:sans-serif">
        이 경험은 JavaScript가 필요합니다. / This experience requires JavaScript.
      </p>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
